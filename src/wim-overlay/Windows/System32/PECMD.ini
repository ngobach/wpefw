LOGS %SystemDrive%\pecmd.log

ENVI $WINDIR=%SystemRoot%
ENVI $WS=%WINDIR%\System32
ENVI $BIT=64
ENVI $PATH=%SystemDrive%\ulua;%SystemDrive%\WinXShell;%PATH%
ENVI PF=%SystemDrive%\Program Files
ENVI $WINXSHELL_LOGFILE=%SystemDrive%\WinXShell.log

INIT IU,3000
DISP W1024 H768 B32 F60
SHOW -1:-1
HIDE

EXEC =!wpeinit

// Install ImDisk driver
DEVI $%SystemDrive%\Windows\System32\imdisk\driver\imdisk.inf

// Create 64MB NTFS RAM drive on R:
RAMD ImDisk,L64,NTFS,R:,ImDisk

FORX \WPE_DEBUG,MyVar,1,ENVI WPEFW_DEBUG=1

FIND $%WPEFW_DEBUG%=1, EXEC %SystemDrive%\ulua\lua.cmd %WS%\daemon.lua
EXEC !%SystemDrive%\PENetwork\PENetwork.exe
SHEL %SystemDrive%\WinXShell\WinXShell.exe -regist -winpe

// Create shortcuts
LINK *%Programs%\Explorer++,%PF%\Explorer++\Explorer++.exe
LINK *%Desktop%\PENetwork,%SystemDrive%\PENetwork\PENetwork.exe
LINK *%Programs%\PENetwork,%SystemDrive%\PENetwork\PENetwork.exe
LINK *%Desktop%\7-Zip,%PF%\easy7zip\7zFM.exe
LINK *%Programs%\7-Zip,%PF%\easy7zip\7zFM.exe
LINK *%Desktop%\ImDisk,%SystemRoot%\System32\imdisk.bat,,%SystemRoot%\System32\imdisk.cpl,0
LINK *%Programs%\ImDisk,%SystemRoot%\System32\imdisk.bat,,%SystemRoot%\System32\imdisk.cpl,0

// Load package auto-mount routines
LOAD %WS%\PECMD-LoadPkgs.ini
