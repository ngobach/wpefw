_SUB CreateFlag
    PUTF* R:\.PkgLoadRan,,0
_END

_SUB MountSinglePkg
    NAME &&Name=%WimPath%
    IFEX ! R:\%&&Name%\,TEAM MOUN %WimPath%,R:\%&&Name%,1|CALC #LoadedCount=%LoadedCount%+1
    IFEX R:\%&&Name%\autoexec.ini,LOAD R:\%&&Name%\autoexec.ini
_END

_SUB MountPkgs
    FORX !\pkgs\*.wim,WimPath,0,CALL MountSinglePkg
_END

// Run once — first call (from PECMD.ini) is silent, re-runs show a summary
ENVI LoadedCount=0
CALL MountPkgs

IFEX ! R:\.PkgLoadRan,CALL CreateFlag!MESS %LoadedCount% package(s) loaded.@Load Packages#OK
