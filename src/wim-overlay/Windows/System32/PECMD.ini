LOGS %SystemDrive%\pecmd.log

ENVI $WINDIR=%SystemRoot%
ENVI $WS=%WINDIR%\System32
ENVI $BIT=64
ENVI $PATH=%SystemDrive%\ulua;%PATH%

INIT IU,3000
DISP W1024 H768 B32 F60
SHOW -1:-1
HIDE

EXEC =!wpeinit

// Install ImDisk driver
DEVI $%SystemDrive%\Windows\System32\imdisk\driver\imdisk.inf
// Create 64MB NTFS RAM drive on R:
RAMD ImDisk,L64,NTFS,R:,ImDisk

EXEC =!regedit /s %WS%\PE.reg
EXEC !%SystemDrive%\ulua\lua.cmd %WS%\init.lua
EXEC %SystemDrive%\ulua\lua.cmd %WS%\daemon.lua
EXEC !%SystemDrive%\WinXShell\WinXShell.exe -regist -winpe
EXEC !%SystemDrive%\PENetwork\PENetwork.exe /autostart

// Our explorer++ is not a long running process so comment out SHEL
// SHEL %WS%\EXPLORER.EXE
LINK *%Programs%\Explorer++,%ProgramFiles%\Explorer++\Explorer++.exe
LINK *%Desktop%\PENetwork,%SystemDrive%\PENetwork\PENetwork.exe
LINK *%Programs%\PENetwork,%SystemDrive%\PENetwork\PENetwork.exe
LINK *%Desktop%\7-Zip,%ProgramFiles%\easy7zip\7zFM.exe
LINK *%Programs%\7-Zip,%ProgramFiles%\easy7zip\7zFM.exe


// Load package auto-mount routines
LOAD %WS%\PECMD-LoadPkgs.ini
